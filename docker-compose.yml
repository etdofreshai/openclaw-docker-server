services:
  openclaw-server:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclaw-server
    restart: unless-stopped
    environment:
      TZ: ${TZ:-America/Chicago}
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-lan}
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT:-18789}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "TOKEN=$$(node -e 'const fs=require(\"fs\"); const config=JSON.parse(fs.readFileSync(\"/home/node/.openclaw/openclaw.json\", \"utf8\")); process.stdout.write(config.gateway?.auth?.token || \"\")') && node dist/index.js health --token \"$$TOKEN\" >/dev/null",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    command:
      - node
      - dist/index.js
      - gateway
      - --bind
      - ${OPENCLAW_GATEWAY_BIND:-lan}
      - --port
      - ${OPENCLAW_GATEWAY_PORT:-18789}
