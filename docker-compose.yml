services:
  openclaw-server:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclaw-server
    privileged: true
    restart: unless-stopped
    environment:
      TZ: ${TZ:-America/Chicago}
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-lan}
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT:-18789}
      OPENCLAW_ALLOW_UNCONFIGURED: ${OPENCLAW_ALLOW_UNCONFIGURED:-false}
    volumes:
      - openclaw-data:/home/node
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ \"$${OPENCLAW_ALLOW_UNCONFIGURED:-false}\" = \"true\" ]; then node -e 'fetch(\"http://127.0.0.1:\" + (process.env.OPENCLAW_GATEWAY_PORT || \"18789\") + \"/healthz\").then((r)=>process.exit(r.status < 500 ? 0 : 1)).catch(()=>process.exit(1))'; else TOKEN=$$(node -e 'const fs=require(\"fs\"); const config=JSON.parse(fs.readFileSync(\"/home/node/.openclaw/openclaw.json\", \"utf8\")); process.stdout.write(config.gateway?.auth?.token || \"\")') && node dist/index.js health --token \"$$TOKEN\" >/dev/null; fi",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    command:
      - sh
      - -lc
      - |
        set -eu
        allow_unconfigured=""
        case "$${OPENCLAW_ALLOW_UNCONFIGURED:-false}" in
          1|true|TRUE|yes|YES|on|ON) allow_unconfigured="--allow-unconfigured" ;;
        esac
        exec node dist/index.js gateway \
          --bind "$${OPENCLAW_GATEWAY_BIND:-lan}" \
          --port "$${OPENCLAW_GATEWAY_PORT:-18789}" \
          $$allow_unconfigured

volumes:
  openclaw-data:
